  <style>
    html, body {
      margin: 0;
      min-height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
      background: #f3f4f6;
      color: #071827;
    }
    body {
      display: grid;
      place-items: center;
      padding: 22px;
    }
    .card {
      width: min(88vw, 360px);
      background: #fff;
      border-radius: 26px;
      padding: 26px 22px;
      box-shadow: 0 18px 44px rgba(11,42,74,.16);
      text-align: center;
    }
    .icon {
      width: 150px;
      height: 150px;
      object-fit: contain;
      border-radius: 30px;
      display: block;
      margin: 0 auto 18px;
      background: #fff;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 24px;
      font-weight: 900;
      color: #0B2A4A;
      letter-spacing: .02em;
    }
    p {
      margin: 0 0 18px;
      color: #4b5563;
      font-size: 14px;
      line-height: 1.55;
      font-weight: 700;
    }
    a {
      display: block;
      border-radius: 14px;
      background: linear-gradient(90deg,#082b4d,#001f66);
      color: #fff;
      text-decoration: none;
      padding: 15px 12px;
      font-size: 17px;
      font-weight: 900;
      letter-spacing: .05em;

<body>
  <script>

    <a id="openApp" href="https://script.google.com/macros/s/AKfycbx8vEYBjJYXsA6yHNqsGfdJkGEmZdAuVQeNcGDX1m6q2JozC4lHNMiYh3GLwp33jlY/exec">巡回開始</a>
